name: release

# 打 v* tag 时触发：在 Windows 上打 NSIS 安装包、在 Ubuntu 上打 Linux AppImage，
# 各自构建+测试+打包，最后汇总成一个 draft Release（含两平台产物与 latest*.yml）。
# 草稿需手动填写双语更新公告后发布——发布后 electron-updater 才会推送给用户。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      # 只打包到 release/，不直接发布（发布交给下面的 release job 统一处理）。
      - run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.AppImage
            release/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create draft release with both platforms
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(find artifacts -type f | sort)
          echo "上传产物："
          echo "$files"
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --draft \
            --notes "自动构建的草稿版本。请填写双语更新公告后再发布。" \
            $files
